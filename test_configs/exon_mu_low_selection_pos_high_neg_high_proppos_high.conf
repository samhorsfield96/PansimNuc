# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/Users/samhorsfield/Software/PansimNuc/testing/Zymo_chr19.gff
fasta_file=/Users/samhorsfield/Software/PansimNuc/testing/Zymo_chr18_chr19.fasta
earlgrey_gff_file=/Users/samhorsfield/Software/PansimNuc/testing/Zymo_EarlGrey_chr19.gff

[output]
outdir=/Users/samhorsfield/Software/PansimNuc/parameter_sweep/exon_mu_low_selection_pos_high_neg_high_proppos_high

[tracking]
contig=19
start=9935
end=10533
augmentation=true
mutation_rate=1e-14
indel_rate=1e-30
selection_distribution=double_exp
selection_lambda1=1e3
selection_lambda2=1e3
selection_cutoff=0.9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30
