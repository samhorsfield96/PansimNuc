# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/home/sam/Software/PansimNuc/testing/Zymo_chr18_chr19.gff
fasta_file=/home/sam/Software/PansimNuc/testing/Zymo_chr18_chr19.fasta
earlgrey_gff_file=/home/sam/Software/PansimNuc/testing/Zymo_EarlGrey_chr18_chr19.gff

[output]
outdir=/data/sam/analysis/PansimNuc/parameter_sweep/TE-COPY_duprate_low_delrate_low_multiplier_none_inversion_none_recombination_low

[tracking]
contig=19
start=9935
end=10533
augmentation=true
mutation_rate=1e-4
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30
#multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

[population]
n_individuals=100
n_generations=200
recombination_rate=1e-3
recombination_size_mean=10000.0
recombination_threshold=0.90
max_multiplier_dist=5000
population_splits=0
generation_splits=0
migration_rate=0.0
genome_size_penalty_per_bp=0.0

[exons]
mutation_rate=1e-50
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[introns]
mutation_rate=1e-50
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[intergenic]
mutation_rate=1e-50
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[TE-CUT]
mutation_rate=1e-50
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30
#multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

[TE-COPY]
mutation_rate=1e-50
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-2
deletion_rate=1e-2
