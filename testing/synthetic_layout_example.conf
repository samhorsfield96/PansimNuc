# feature,start,end,strand,attributes
# Non-TE features go to *_coding.gff
# TE-like features (or names listed via --te-features) go to *_earlgrey.gff

# Gene 1 with two exons and one intron
gene,1,900,+,ID=gene1;Name=gene_one
exon,1,250,+,Parent=gene1
intron,251,650,+,Parent=gene1
exon,651,900,+,Parent=gene1

# Intergenic spacer
intergenic,901,1200,+,ID=igr1

# TE block 1
TE-COPY,1201,1800,-,ID=TE_FAMILY_ALPHA_1
LTR/Gypsy,1850,2500,+,ID=TE_FAMILY_GYPSY_1

# Gene 2
gene,2600,3600,-,ID=gene2;Name=gene_two
exon,2600,3000,-,Parent=gene2
intron,3001,3300,-,Parent=gene2
exon,3301,3600,-,Parent=gene2

# TE block 2
LINE,3800,4500,+,ID=TE_FAMILY_LINE_1
