# contig,feature,start,end,strand,attributes
# Non-TE features go to *_coding.gff
# TE-like features (or names listed via --te-features) go to *_earlgrey.gff

# Gene 1 with two exons and one intron
19,gene,1,900,+,ID=gene1;Name=gene_one
19,exon,1,250,+,Parent=gene1
19,intron,251,650,+,Parent=gene1
19,exon,651,900,+,Parent=gene1

# Intergenic spacer
19,intergenic,901,1200,+,ID=igr1

# TE block 1
19,TE-COPY,1201,1800,-,ID=TE_FAMILY_ALPHA_1
19,LTR/Gypsy,1850,2500,+,ID=TE_FAMILY_GYPSY_1

# Gene 2
19,gene,2600,3600,-,ID=gene2;Name=gene_two
19,exon,2600,3000,-,Parent=gene2
19,intron,3001,3300,-,Parent=gene2
19,exon,3301,3600,-,Parent=gene2

# TE block 2
19,LINE,3800,4500,+,ID=TE_FAMILY_LINE_1

# Second contig/chromosome with mixed features
20,gene,1,700,+,ID=gene20_1;Name=gene_twenty_one
20,exon,1,180,+,Parent=gene20_1
20,intron,181,500,+,Parent=gene20_1
20,exon,501,700,+,Parent=gene20_1
20,TE-CUT,900,1350,-,ID=TE_FAMILY_CUT_20_1
