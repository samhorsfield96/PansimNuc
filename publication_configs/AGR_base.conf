# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/home/sam/Software/PansimNuc/testing/Zymo_chr19.gff
fasta_file=/home/sam/Software/PansimNuc/testing/Zymo_chr19.fasta
earlgrey_gff_file=/home/sam/Software/PansimNuc/testing/Zymo_EarlGrey_chr19.gff

[output]
outdir=/scratch/sam_simulations/grid_parameter_sweep/AGR_analysis/run_19

[tracking]
contig=19
start=19000
end=40000
augmentation=true
write_file=false
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=1e-6
selection_high=1e-5
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30
#multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

[population]
n_individuals=100
n_generations=100
recombination_rate=1e-12
recombination_size_mean=10000.0
recombination_threshold=0.90
max_multiplier_dist=5000
population_splits=0
generation_splits=0
migration_rate=0.0
genome_size_penalty_per_bp=1e-5

[exons]
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-5
selection_high=-1e-6
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[introns]
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-5
selection_high=-1e-6
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[intergenic]
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-5
selection_high=-1e-6
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30

[TE-CUT]
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-5
selection_high=-1e-6
duplication_rate=1e-30
deletion_rate=1e-30
inversion_rate=1e-30
#multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

[TE-COPY]
mutation_rate=1e-8
indel_rate=1e-50
selection_distribution=uniform
selection_low=-1e-14
selection_high=-1e-15
duplication_rate=5e-2
deletion_rate=6e-2
inversion_rate=1e-30
#multipler distribution is gamma
multiplier_rate=100.0
multiplier_scale=1.0

[misc]
threads=1
seed=42
verbose=true
print_DFE=true
print_all_generations=false
