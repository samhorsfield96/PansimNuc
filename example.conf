# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/data/sam/genomes/Zymoseptoria/gffs/Zymtr1_INRAE_GeneModels_genes_20230422.gff3
fasta_file=/data/sam/genomes/Zymoseptoria/Zymoseptoria_tritici.MG2.dna.toplevel.mt+.fa
earlgrey_gff_file=/data/sam/genomes/Zymoseptoria/gffs/IPO323.filteredRepeats.gff

[output]
fasta_file=/home/sam/Software/PansimNuc/test_output.fa
gff_file=/home/sam/Software/PansimNuc/test_output.gff

[population]
n_individuals=5
n_generations=5
recombination_rate=1e-8
recombination_size_mean=1000.0
recombination_threshold=0.01
max_multiplier_dist=10

[exons]
mutation_rate=1e-8
selection_distribution=double_exp
selection_lambda1=0.1
selection_lambda2=1.0
selection_cutoff=0.5
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10

[introns]
mutation_rate=1e-9
selection_distribution=uniform
selection_low=0.0
selection_high=0.05
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10

[intergenic]
mutation_rate=5e-9
selection_distribution=exp
selection_lambda=0.02
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10

[TE-CUT]
mutation_rate=1e-8
selection_distribution=normal
selection_mean=0.1
selection_std_dev=0.02
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
# multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

[TE-COPY]
mutation_rate=1e-8
selection_distribution=poisson
selection_lambda=0.1
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
# multipler distribution is gamma
multiplier_rate=1.0
multiplier_scale=1.0

# Legacy compatibility:
# selection_coefficient=<lambda>
# still works as shorthand for:
# selection_distribution=exp
# selection_lambda=<lambda>

[misc]
threads=1
seed=42
