# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=genes.gff3
fasta_file=genome.fasta

[features]
# Which feature types to extract
exon=true
intron=true
intergenic=true

[output]
# Output formatting options
format=fasta
include_coordinates=true
sequence_header_format=full

[filters]
# Feature filtering criteria
min_length=50
max_length=10000
strand=both

[processing]
# Processing options
threads=4
buffer_size=1000
verbose=true
