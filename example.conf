# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/home/sam/Software/PansimNuc/Zymo_test.gff
fasta_file=/home/sam/Software/PansimNuc/Zymo_test.fa
earlgrey_gff_file=/home/sam/Software/PansimNuc/Zymo_EarlGrey_test.gff

[output]
fasta_file=/home/sam/Software/PansimNuc/test_output.fa
gff_file=/home/sam/Software/PansimNuc/test_output.gff

[population]
n_individuals=5
n_generations=5
recombination_rate=1
recombination_size_mean=10000.0
recombination_threshold=0.90
max_multiplier_dist=5000

[exons]
mutation_rate=10
selection_distribution=double_exp
selection_lambda1=100.0
selection_lambda2=100.0
selection_cutoff=0.1
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=10

[introns]
mutation_rate=10
selection_distribution=uniform
selection_low=0.0
selection_high=0.05
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=10

[intergenic]
mutation_rate=100
selection_distribution=exp
selection_lambda=0.02
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=10

[TE-CUT]
mutation_rate=100
selection_distribution=normal
selection_mean=0.1
selection_std_dev=0.02
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=1
# multipler distribution is gamma
multiplier_rate=3.0
multiplier_scale=1.0

[TE-COPY]
mutation_rate=100
selection_distribution=poisson
selection_lambda=0.1
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=1000
# multipler distribution is gamma
multiplier_rate=3.0
multiplier_scale=1.0

# Legacy compatibility:
# selection_coefficient=<lambda>
# still works as shorthand for:
# selection_distribution=exp
# selection_lambda=<lambda>

[misc]
threads=1
seed=42
