# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/home/sam/Software/PansimNuc/testing/Zymo_chr19.gff
fasta_file=/home/sam/Software/PansimNuc/testing/Zymo_chr19.fasta
earlgrey_gff_file=/home/sam/Software/PansimNuc/testing/Zymo_EarlGrey_chr19.gff

[output]
outdir=/home/sam/Software/PansimNuc/test_output

[tracking]
contig=19,19
start=0,60000
end=20000,100000
augmentation=false
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=1
#multipler distribution is gamma
multiplier_rate=3.0
multiplier_scale=1.0

[population]
n_individuals=50
n_generations=50
recombination_rate=1.0
recombination_size_mean=10000.0
recombination_threshold=0.90
max_multiplier_dist=5000
population_splits=1,2,1,3
generation_splits=1,20,40,45
migration_rate=0.01

[exons]
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=double_exp
selection_lambda1=1e10
selection_lambda2=1e5
selection_cutoff=0.5
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3

[introns]
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3

[intergenic]
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=10

[TE-CUT]
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=1
# multipler distribution is gamma
multiplier_rate=3.0
multiplier_scale=1.0

[TE-COPY]
mutation_rate=1e-10
indel_rate=1e-11
selection_distribution=uniform
selection_low=-1e-9
selection_high=1e-9
duplication_rate=1e-3
deletion_rate=1e-3
inversion_rate=1e-3
max_duplications=1000
# multipler distribution is gamma
multiplier_rate=3.0
multiplier_scale=1.0

[misc]
threads=1
seed=42
verbose=true
print_DFE=true
print_all_generations=false
