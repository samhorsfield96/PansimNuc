# Example configuration file for PansimNuc
# This file demonstrates the config parser capabilities

[input]
# Input files
gff_file=/data/sam/genomes/Zymoseptoria/gffs/Zymtr1_INRAE_GeneModels_genes_20230422.gff3
fasta_file=/data/sam/genomes/Zymoseptoria/Zymoseptoria_tritici.MG2.dna.toplevel.mt+.fa
earlgrey_gff_file=/data/sam/genomes/Zymoseptoria/gffs/IPO323.filteredRepeats.gff

[output]
fasta_file=/home/sam/Software/PansimNuc/test_output.fa

[population]
n_individuals=10
n_generations=10
recombination_rate=1e-8
recombination_size_mean=1000.0
recombination_threshold=0.01

[exons]
mutation_rate=1e-8
selection_coefficient=0.1
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
duplication_insertion_prob=0.5

[introns]
mutation_rate=1e-9
selection_coefficient=0.05
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
duplication_insertion_prob=0.5

[intergenic]
mutation_rate=5e-9
selection_coefficient=0.02
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
duplication_insertion_prob=0.5

[TE-CUT]
mutation_rate=1e-8
selection_coefficient=0.1
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
duplication_insertion_prob=0.5
multiplier=1.0

[TE-COPY]
mutation_rate=1e-8
selection_coefficient=0.1
duplication_rate=1e-9
deletion_rate=1e-9
inversion_rate=1e-9
max_duplications=10
duplication_insertion_prob=0.5
multiplier=1.0

[misc]
threads=1
seed=42
